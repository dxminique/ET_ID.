<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ticket Service - Status</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1e3a5f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    h1 { font-size: 3rem; margin-bottom: 0.2rem; }
    .version {
      font-size: 5rem;
      font-weight: bold;
      background: white;
      color: #1e3a5f;
      padding: 0.5rem 2rem;
      border-radius: 12px;
      margin: 1rem 0;
    }
    .badge {
      background: #2ecc71;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 1rem;
      margin-top: 0.5rem;
      display: inline-block;
    }
    .status { font-size: 1.2rem; opacity: 0.85; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>🎫 Ticket Service</h1>
  <div class="version">v1.0</div>
  <div class="badge">● Servicio activo</div>
  <p class="status">DOY0101 - Evaluación Parcial 3 - Observabilidad DevOps</p>
</body>
</html>
